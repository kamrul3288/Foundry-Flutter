name: foundry_flutter

workspace:
  - app/


environment:
  sdk: ^3.9.2

dev_dependencies:
  melos: ^7.1.0

melos:
  command:
    bootstrap:
      environment:
        sdk: ^3.9.2

      dependencies:
        code_analyzer: ^0.0.1
        common: ^0.0.1
        domain: ^0.0.1
        designsystem: ^0.0.1
        navigation: ^0.0.1
        entity: ^0.0.1
        data: ^0.0.1
        ui: ^0.0.1

        flutter_bloc: ^9.1.1
        get_it: ^8.0.3
        cupertino_icons: ^1.0.8
        shared_preferences: ^2.5.3
        equatable: ^2.0.7
        flutter_svg: ^2.2.0
        formz: ^0.8.0
        http: ^1.5.0
        jiffy: ^6.4.3
        fluttertoast: ^8.2.12
        image_picker: ^1.1.2
        url_launcher: ^6.3.2
        webview_flutter: ^4.13.0
        json_annotation: ^4.9.0
        envied: ^1.2.0
        flutter_local_notifications: ^18.0.1
        intl: ^0.20.2
        freezed_annotation: ^2.4.4
        carousel_slider: ^5.0.0
        flutter_screenutil: ^5.9.3
        lottie: ^3.3.1
        font_awesome_flutter: ^10.8.0
        flutter_widget_from_html: ^0.15.3
        logger: ^2.6.1
        yaml_edit: ^2.2.2
        go_router: ^16.2.0
        flutter_inappwebview: ^6.1.5
        background_downloader: ^9.2.6
        rxdart: ^0.28.0
        flutter_html: ^3.0.0
        google_maps_flutter: ^2.13.1

      dev_dependencies:
        flutter_test:
          sdk: flutter
        flutter_lints: ^6.0.0
        dart_code_linter: ^3.0.0
        melos: ^6.3.3
        json_serializable: ^6.10.0
        build_runner: ^2.7.0
        envied_generator: ^1.2.0
        intl_utils: ^2.8.11
        flutter_launcher_icons: "^0.14.4"

  scripts:
    clean_and_get:
      run: melos exec -- flutter clean && melos bootstrap
      description: Cleans and then fetches dependencies for all packages.
