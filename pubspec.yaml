name: foundry_flutter

workspace:
  - app/
  #========= THIS IS FLUTTER POPULAR PACKAGES SECTION=========#
  - flutter_popular_packages/flutter_secure_storage/
  - flutter_popular_packages/get_it/
  - flutter_popular_packages/go_router/
  - flutter_popular_packages/dio/
  - flutter_popular_packages/auto_router/

  - feature_playground_molecules/media_picker/
  - feature_playground_molecules/go_router_navigation/

  - feature_playground_atoms/clean_architecture_bloc/
  - feature_playground_atoms/flutter_design_system/

environment:
  sdk: ^3.11.0

dev_dependencies:
  melos: ^7.4.0

dependency_overrides:
  analyzer: ^10.0.0

melos:
  command:
    bootstrap:
      environment:
        sdk: ^3.11.0

      dependencies:
        flutter_secure_storage: ^10.0.0
        flutter_bloc: ^9.1.1
        flutter_riverpod: ^3.2.1
        riverpod_annotation: ^4.0.2
        get_it: ^9.2.0
        cupertino_icons: ^1.0.8
        shared_preferences: ^2.5.4
        equatable: ^2.0.8
        flutter_svg: ^2.2.3
        formz: ^0.8.0
        http: ^1.6.0
        jiffy: ^6.4.4
        fluttertoast: ^9.0.0
        image_picker: ^1.2.1
        url_launcher: ^6.3.2
        webview_flutter: ^4.13.1
        json_annotation: ^4.10.0
        envied: ^1.3.3
        flutter_local_notifications: ^20.1.0
        intl: ^0.20.2
        freezed_annotation: ^3.1.0
        carousel_slider: ^5.1.2
        flutter_screenutil: ^5.9.3
        lottie: ^3.3.2
        font_awesome_flutter: ^10.12.0
        flutter_widget_from_html: ^0.17.1
        logger: ^2.6.2
        yaml_edit: ^2.2.4
        dio: ^5.9.1
        go_router: ^17.1.0
        flutter_inappwebview: ^6.1.5
        background_downloader: ^9.5.2
        rxdart: ^0.28.0
        flutter_html: ^3.0.0
        google_maps_flutter: ^2.14.2
        auto_route: ^11.1.0
        path_provider: ^2.1.5
        path: ^1.9.1
        flutter_image_compress: ^2.4.0
        permission_handler: ^12.0.1

      dev_dependencies:
        flutter_test:
          sdk: flutter
        flutter_lints: ^6.0.0
        dart_code_linter: ^3.2.1
        melos: ^7.4.0
        json_serializable: ^6.12.0
        build_runner: ^2.11.1
        envied_generator: ^1.3.3
        intl_utils: ^2.8.14
        flutter_launcher_icons: ^0.14.4
        auto_route_generator: ^10.5.0
        riverpod_generator: ^4.0.3

  scripts:
    clean_and_get:
      run: melos exec -- flutter clean && melos bootstrap
      description: Cleans and then fetches dependencies for all packages.

    publish-android-app-ta:
      description: Publish android app to TestApp.io
      run: |
        cd app
        flutter clean
        flutter pub get
        flutter build apk --release
        ta-cli publish --config=.ta-cli-android.json

    publish-ios-app-ta:
      description: Publish iOS app to TestApp.io
      run: |
        cd app
        flutter clean
        flutter pub get
        flutter build ipa --release --export-options-plist=ios/TestAppIoAdHoc.plist
        ta-cli publish --config=.ta-cli-ios.json

    auto_route_generate:
      description: Generate the auto route files
      run: melos exec --scope=auto_router_x -- dart run build_runner build --delete-conflicting-outputs

    build_runner:
      description: Run build runner for generator riverpod & auto route
      run: melos exec -- dart run build_runner build --delete-conflicting-outputs

    build_runner_watch:
      description: Run build runner for generator riverpod & auto route in watch mode
      run: melos exec -- dart run build_runner watch --delete-conflicting-outputs

    update_minor_deps:
      description: Update minor dependencies
      run: dart run scripts/update_melos_minor_deps.dart

    update_major_deps:
      description: Update major dependencies
      run: dart run scripts/update_melos_major_deps.dart
