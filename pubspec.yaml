name: foundry_flutter

workspace:
  - app/
  - foundry_packages/flutter_secure_storagex/
  - foundry_packages/auto_router_x/
  - foundry_packages/go_router_x/
  - foundry_packages/dio_x/
  - foundry_feat_components/file_uploader/

environment:
  sdk: ^3.9.2

dev_dependencies:
  melos: ^7.1.0

dependency_overrides:
  analyzer: ^10.0.0

melos:
  command:
    bootstrap:
      environment:
        sdk: ^3.9.2

      dependencies:
        flutter_secure_storage: ^9.2.4
        flutter_bloc: ^9.1.1
        flutter_riverpod: ^3.2.0
        riverpod_annotation: ^4.0.1
        get_it: ^8.0.3
        cupertino_icons: ^1.0.8
        shared_preferences: ^2.5.3
        equatable: ^2.0.7
        flutter_svg: ^2.2.0
        formz: ^0.8.0
        http: ^1.5.0
        jiffy: ^6.4.3
        fluttertoast: ^8.2.12
        image_picker: ^1.2.0
        url_launcher: ^6.3.2
        webview_flutter: ^4.13.0
        json_annotation: ^4.9.0
        envied: ^1.2.0
        flutter_local_notifications: ^18.0.1
        intl: ^0.20.2
        freezed_annotation: ^2.4.4
        carousel_slider: ^5.0.0
        flutter_screenutil: ^5.9.3
        lottie: ^3.3.1
        font_awesome_flutter: ^10.8.0
        flutter_widget_from_html: ^0.15.3
        logger: ^2.6.1
        yaml_edit: ^2.2.2
        dio: ^5.9.0
        go_router: ^16.2.0
        flutter_inappwebview: ^6.1.5
        background_downloader: ^9.2.6
        rxdart: ^0.28.0
        flutter_html: ^3.0.0
        google_maps_flutter: ^2.13.1
        auto_route: ^10.1.2
        path_provider: ^2.1.5
        path: ^1.9.1
        flutter_image_compress: ^2.4.0
        permission_handler: ^12.0.1

      dev_dependencies:
        flutter_test:
          sdk: flutter
        flutter_lints: ^6.0.0
        dart_code_linter: ^3.2.1
        melos: ^6.3.3
        json_serializable: ^6.10.0
        build_runner: ^2.10.5
        envied_generator: ^1.2.0
        intl_utils: ^2.8.11
        flutter_launcher_icons: ^0.14.4
        auto_route_generator: ^10.1.2
        riverpod_generator: ^4.0.2

  scripts:
    clean_and_get:
      run: melos exec -- flutter clean && melos bootstrap
      description: Cleans and then fetches dependencies for all packages.

    publish-android-app-ta:
      description: Publish android app to TestApp.io
      run: |
        cd app
        flutter clean
        flutter pub get
        flutter build apk --release
        ta-cli publish --config=.ta-cli-android.json

    publish-ios-app-ta:
      description: Publish iOS app to TestApp.io
      run: |
        cd app
        flutter clean
        flutter pub get
        flutter build ipa --release --export-options-plist=ios/TestAppIoAdHoc.plist
        ta-cli publish --config=.ta-cli-ios.json

    auto_route_generate:
      description: Generate the auto route files
      run: melos exec --scope=auto_router_x -- dart run build_runner build --delete-conflicting-outputs

    build_runner:
      description: Run build runner for generator riverpod & auto route
      run: melos exec -- dart run build_runner build --delete-conflicting-outputs

    build_runner_watch:
      description: Run build runner for generator riverpod & auto route in watch mode
      run: melos exec -- dart run build_runner watch --delete-conflicting-outputs
